<form method="POST" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
        <label for="client_id" class="form-label">Client <span class="text-danger">*</span></label>
        <select class="form-select" id="client_id" name="client_id" required>
            <option value="">Select a client...</option>
            {% for cl in clients %}
                <option value="{{ cl.id }}"
                    {% if selected_client_id == cl.id %}selected{% endif %}>
                    {{ cl.company_name }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="row">
        <div class="col-md-4 mb-3">
            <label for="date" class="form-label">Date</label>
            <input type="date" class="form-control" id="date" name="date"
                   value="{{ contact.date.isoformat() if contact else today }}">
        </div>
        <div class="col-md-4 mb-3">
            <label for="time" class="form-label">Time <small class="text-muted">(optional)</small></label>
            <input type="time" class="form-control" id="time" name="time"
                   value="{{ contact.time.strftime('%H:%M') if contact and contact.time else '' }}">
        </div>
        <div class="col-md-4 mb-3">
            <label for="contact_type" class="form-label">Type</label>
            <select class="form-select" id="contact_type" name="contact_type">
                {% for t in contact_types %}
                    <option value="{{ t }}"
                        {% if contact and contact.contact_type == t %}selected{% endif %}>
                        {{ t|capitalize }}
                    </option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="mb-3">
        <label for="notes" class="form-label">Notes</label>
        <textarea class="form-control" id="notes" name="notes" rows="4">{{ contact.notes if contact else (prefill_notes or '') }}</textarea>
    </div>

    <div class="mb-3">
        <label for="outcome" class="form-label">Outcome</label>
        <input type="text" class="form-control" id="outcome" name="outcome"
               value="{{ contact.outcome if contact else '' }}"
               placeholder="e.g. Agreed to follow-up call next week">
    </div>

    {% if google_connected %}
    <div class="card mb-3 border-info">
        <div class="card-body py-2 px-3">
            <div class="form-check mb-1">
                <input class="form-check-input" type="checkbox" id="sync_to_google" name="sync_to_google"
                       {{ 'checked' if contact and contact.calendar_sync }}>
                <label class="form-check-label" for="sync_to_google">
                    <i class="bi bi-calendar3 me-1 text-primary"></i>Sync to Google Calendar
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="create_meet" name="create_meet">
                <label class="form-check-label" for="create_meet">
                    <i class="bi bi-camera-video me-1 text-success"></i>Create Google Meet link
                </label>
            </div>
            {% if contact and contact.meet_link %}
            <div class="mt-2">
                <a href="{{ contact.meet_link }}" target="_blank" rel="noopener" class="btn btn-sm btn-outline-success">
                    <i class="bi bi-camera-video me-1"></i>Join Meeting
                </a>
            </div>
            {% endif %}
        </div>
    </div>
    {% endif %}

    <div class="mb-3">
        <label for="file" class="form-label">Attachment <small class="text-muted">(optional)</small></label>
        <input type="file" class="form-control" id="file" name="file">
    </div>

    <div class="mb-3">
        <label for="file_description" class="form-label">File Description <small class="text-muted">(optional)</small></label>
        <input type="text" class="form-control" id="file_description" name="file_description" maxlength="200"
               placeholder="e.g. Meeting agenda document">
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>{{ 'Update' if contact else 'Log' }} Interaction
        </button>
        {% if panel_mode %}
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="offcanvas">Cancel</button>
        {% else %}
            <a href="{{ url_for('contacts.list_contacts') }}" class="btn btn-outline-secondary">Cancel</a>
        {% endif %}
    </div>
</form>
