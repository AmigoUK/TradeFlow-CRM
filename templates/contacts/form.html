{% extends "base.html" %}

{% block title %}{{ 'Edit' if contact else 'Log' }} Interaction — NextStep CRM{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('contacts.list_contacts') }}">Interactions</a></li>
        <li class="breadcrumb-item active">{{ 'Edit' if contact else 'Log Interaction' }}</li>
    </ol>
</nav>

<h1 class="mb-4">{{ 'Edit Interaction' if contact else 'Log Interaction' }}</h1>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="client_id" class="form-label">Client <span class="text-danger">*</span></label>
                <select class="form-select" id="client_id" name="client_id" required>
                    <option value="">Select a client...</option>
                    {% for cl in clients %}
                        <option value="{{ cl.id }}"
                            {% if selected_client_id == cl.id %}selected{% endif %}>
                            {{ cl.company_name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="date" class="form-label">Date</label>
                    <input type="date" class="form-control" id="date" name="date"
                           value="{{ contact.date.isoformat() if contact else today }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="time" class="form-label">Time <small class="text-muted">(optional)</small></label>
                    <input type="time" class="form-control" id="time" name="time"
                           value="{{ contact.time.strftime('%H:%M') if contact and contact.time else '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="contact_type" class="form-label">Type</label>
                    <select class="form-select" id="contact_type" name="contact_type">
                        {% for t in contact_types %}
                            <option value="{{ t }}"
                                {% if contact and contact.contact_type == t %}selected{% endif %}>
                                {{ t|capitalize }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label for="notes" class="form-label">Notes</label>
                <textarea class="form-control" id="notes" name="notes" rows="4">{{ contact.notes if contact else '' }}</textarea>
            </div>

            <div class="mb-3">
                <label for="outcome" class="form-label">Outcome</label>
                <input type="text" class="form-control" id="outcome" name="outcome"
                       value="{{ contact.outcome if contact else '' }}"
                       placeholder="e.g. Agreed to follow-up call next week">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>{{ 'Update' if contact else 'Log' }} Interaction
                </button>
                <a href="{{ url_for('contacts.list_contacts') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
