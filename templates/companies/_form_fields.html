<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
        <label for="company_name" class="form-label">Company Name <span class="text-danger">*</span></label>
        <input type="text" class="form-control" id="company_name" name="company_name"
               value="{{ company.company_name if company else '' }}" required>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="contact_person" class="form-label">Contact Person</label>
            <input type="text" class="form-control" id="contact_person" name="contact_person"
                   value="{{ company.contact_person if company else '' }}">
        </div>
        <div class="col-md-6 mb-3">
            <label for="industry" class="form-label">Industry</label>
            <input type="text" class="form-control" id="industry" name="industry"
                   value="{{ company.industry if company else '' }}">
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="phone" class="form-label">Phone</label>
            <input type="tel" class="form-control" id="phone" name="phone"
                   value="{{ company.phone if company else '' }}">
        </div>
        <div class="col-md-6 mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email"
                   value="{{ company.email if company else '' }}">
        </div>
    </div>

    <div class="mb-3">
        <label for="status" class="form-label">Status</label>
        <select class="form-select" id="status" name="status">
            {% for s in statuses %}
                <option value="{{ s }}" {% if company and company.status == s %}selected{% elif not company and s == 'lead' %}selected{% endif %}>
                    {{ s|capitalize }}
                </option>
            {% endfor %}
        </select>
    </div>

    {% if custom_fields %}
    <hr>
    <h6 class="text-muted mb-3"><i class="bi bi-plus-circle me-1"></i>Additional Information</h6>
    {% for field in custom_fields %}
    <div class="mb-3">
        <label for="custom_field_{{ field.id }}" class="form-label">
            <i class="bi {{ field.icon }} me-1"></i>{{ field.label }}
        </label>
        {% if field.field_type == 'textarea' %}
        <textarea class="form-control" id="custom_field_{{ field.id }}" name="custom_field_{{ field.id }}" rows="2">{{ custom_values.get(field.id, '') }}</textarea>
        {% elif field.field_type == 'url' %}
        <input type="url" class="form-control" id="custom_field_{{ field.id }}" name="custom_field_{{ field.id }}"
               value="{{ custom_values.get(field.id, '') }}" placeholder="https://...">
        {% else %}
        <input type="text" class="form-control" id="custom_field_{{ field.id }}" name="custom_field_{{ field.id }}"
               value="{{ custom_values.get(field.id, '') }}">
        {% endif %}
    </div>
    {% endfor %}
    {% endif %}

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>{{ 'Update' if company else 'Create' }} Company
        </button>
        {% if panel_mode %}
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="offcanvas">Cancel</button>
        {% else %}
            <a href="{{ url_for('companies.detail_company', id=company.id) if company else url_for('companies.list_companies') }}"
               class="btn btn-outline-secondary">Cancel</a>
        {% endif %}
    </div>
</form>
