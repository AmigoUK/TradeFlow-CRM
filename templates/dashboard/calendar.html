{% extends "base.html" %}

{% block title %}Calendar — TradeFlow CRM{% endblock %}

{% block extra_head %}
<style>
    #calendar {
        max-width: 1100px;
        margin: 0 auto;
    }
    .fc .fc-toolbar-title {
        font-size: 1.4rem;
    }
    .fc .fc-button {
        font-size: 0.85rem;
    }
    .fc-event {
        cursor: pointer;
        font-size: 0.8rem;
    }
    .calendar-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        padding: 1rem 0;
    }
    .calendar-legend-item {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.85rem;
        color: #6c757d;
    }
    .calendar-legend-swatch {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        display: inline-block;
    }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="bi bi-calendar3 me-2"></i>Calendar</h1>
</div>

<div class="card mb-4">
    <div class="card-body">
        <div id="calendar"></div>
    </div>
</div>

<!-- Colour Legend -->
<div class="card">
    <div class="card-body">
        <h6 class="text-muted mb-2">Colour Legend</h6>
        <div class="calendar-legend">
            <div class="calendar-legend-item">
                <span class="calendar-legend-swatch" style="background:#dc3545;"></span> High Priority
            </div>
            <div class="calendar-legend-item">
                <span class="calendar-legend-swatch" style="background:#ffc107;"></span> Medium Priority
            </div>
            <div class="calendar-legend-item">
                <span class="calendar-legend-swatch" style="background:#198754;"></span> Low Priority
            </div>
            <div class="calendar-legend-item">
                <span class="calendar-legend-swatch" style="background:#6c757d;"></span> Completed
            </div>
            <div class="calendar-legend-item">
                <span class="calendar-legend-swatch" style="background:#0d6efd;"></span> Phone
            </div>
            <div class="calendar-legend-item">
                <span class="calendar-legend-swatch" style="background:#6f42c1;"></span> Email
            </div>
            <div class="calendar-legend-item">
                <span class="calendar-legend-swatch" style="background:#fd7e14;"></span> Meeting
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    var calendarEl = document.getElementById("calendar");
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: "dayGridMonth",
        headerToolbar: {
            left: "prev,next today",
            center: "title",
            right: "dayGridMonth,timeGridWeek,listWeek"
        },
        buttonText: {
            today: "Today",
            month: "Month",
            week: "Week",
            list: "List"
        },
        events: {
            url: "{{ url_for('dashboard.api_events') }}",
            failure: function () {
                alert("Failed to load calendar events.");
            }
        },
        eventClick: function (info) {
            var props = info.event.extendedProps;
            if (props.clientId) {
                window.location.href = "/clients/" + props.clientId;
            }
        },
        dateClick: function (info) {
            window.location.href = "{{ url_for('followups.create_followup') }}?due_date=" + info.dateStr;
        },
        eventDidMount: function (info) {
            var props = info.event.extendedProps;
            if (props.notes) {
                info.el.title = props.notes;
            }
        },
        height: "auto",
        firstDay: 1
    });
    calendar.render();
});
</script>
{% endblock %}
